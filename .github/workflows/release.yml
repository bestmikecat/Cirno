name: Release

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "app/**"
      - ".github/workflows/release.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
      - ".github/workflows/release.yml"
  release:
    types: [published]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :app:assembleRelease

      - name: Sign app APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: rename APK
        id: rename
        run: |
          VERSION=$(jq -r '.elements[0].versionName // "unknown"' app/build/outputs/apk/release/output-metadata.json)
          NEW_NAME="Cirno-${VERSION}-release.apk"
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" "$NEW_NAME"
          echo "new_file=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload apk to Release assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.rename.outputs.new_file }}
          asset_name: ${{ steps.rename.outputs.new_file }}
          asset_content_type: application/vnd.android.package-archive

      - name: Send to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_CHAT_THREAD: ${{ secrets.TG_CHAT_RELEASE_THREAD }}
          RELEASE_BODY: ${{ github.event.release.body }}
          VERSION: ${{ steps.rename.outputs.version }}
        run: |
          BODY="${RELEASE_BODY:-无详细说明}"
          CAPTION_FULL=$(printf "v%s\n%s" "$VERSION" "$BODY")
          CAPTION=$(echo "$CAPTION_FULL" | head -c 1020)
          curl -F document=@"${{ steps.rename.outputs.new_file }}" \
               --form-string caption="$CAPTION" \
               "https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument?chat_id=$TG_CHAT_ID&message_thread_id=$TG_CHAT_THREAD"
