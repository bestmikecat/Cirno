name: Android CI

on:
  workflow_dispatch:
  push:
    branches: ["legacy"]
    paths:
      - "app/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: ["legacy"]
    paths:
      - "app/**"
      - ".github/workflows/android.yml"
  
permissions:
  contents: read
  actions: read 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :app:assembleRelease

      - uses: r0adkll/sign-android-release@v1
        name: Sign app APK
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: 重命名 APK
        id: rename
        run: |
          VERSION=$(jq -r '.elements[0].versionName // "unknown"' app/build/outputs/apk/release/output-metadata.json)
          NEW_NAME="Cirno-${VERSION}-${{ github.run_number }}.apk"
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" "$NEW_NAME"
          echo "new_file=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.new_file }}
          path: ${{ steps.rename.outputs.new_file }}
          if-no-files-found: warn

      - name: Publish to Telegram via bot
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_CHAT_THREAD: ${{ secrets.TG_CHAT_THREAD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_SHA: ${{ github.sha }}
          WORKFLOW_NAME: "Android CI"
        run: |
          WORKFLOW_ID=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows" \
            | jq -r --arg name "$WORKFLOW_NAME" '.workflows[] | select(.name==$name) | .id')
          
          LAST_SUCCESS_SHA=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?status=success&per_page=1" \
            | jq -r '.workflow_runs[0].head_sha')
          
          if [ -z "$LAST_SUCCESS_SHA" ]; then
            LAST_SUCCESS_SHA="$CURRENT_SHA"
          fi
          
          COMPARE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/compare/$LAST_SUCCESS_SHA...$CURRENT_SHA")
          
          COMMITS=$(echo "$COMPARE" | jq -r '.commits[]? | "• \(.commit.message | split("\n")[0] | .[0:70])"')
          
          if [ -z "$COMMITS" ]; then
            HISTORY="无新提交"
          else
            HISTORY=$(printf "上次成功构建 (%s) → 当前 (%s) 的变更：\n%s" "${LAST_SUCCESS_SHA:0:7}" "${CURRENT_SHA:0:7}" "$COMMITS")
          fi
          
          CAPTION=$(echo "$HISTORY" | head -c 900)
          if [ ${#HISTORY} -gt 900 ]; then
            CAPTION="${CAPTION}...（已截断）"
          fi
          
          curl -F document=@"${{ steps.rename.outputs.new_file }}" \
            --form-string caption="$CAPTION" \
            "https://api.telegram.org/bot$TG_BOT_TOKEN/sendDocument?chat_id=$TG_CHAT_ID&message_thread_id=$TG_CHAT_THREAD"
